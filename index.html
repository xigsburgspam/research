<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Xiro Gravity | Levitate Beyond Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .card-hover:hover { transform: translateY(-4px); }
        .dark body { background-color: #0c0a09; color: #f5f5f4; }
        .dark nav { background-color: rgba(12, 10, 9, 0.8); border-color: #292524; }
        .dark .bg-white { background-color: #1c1917; }
        .dark .border-stone-200 { border-color: #292524; }
        .dark .text-stone-900 { color: #f5f5f4; }
        .dark .text-stone-600 { color: #a8a29e; }
        .dark .text-stone-500 { color: #78716c; }
        .dark .text-stone-400 { color: #57534e; }
        .dark .bg-stone-50 { background-color: #0c0a09; }
        .dark .bg-stone-100 { background-color: #292524; }
        .dark input { background-color: #1c1917; border-color: #292524; color: #f5f5f4; }
        .dark footer { background-color: #0c0a09; border-color: #292524; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen transition-colors duration-300">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <span class="font-bold text-xl tracking-tighter uppercase italic">Team Xiro Gravity</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-xl hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors text-stone-600 dark:text-stone-400">
                    <i data-lucide="sun" class="hidden dark:block" size="20"></i>
                    <i data-lucide="moon" class="block dark:hidden" size="20"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 md:py-24 text-center">
        <div class="inline-block mb-4 px-4 py-1.5 bg-stone-900 text-white dark:bg-stone-100 dark:text-stone-900 rounded-full text-[10px] font-bold uppercase tracking-[0.2em]">
            Levitate Beyond Infinity
        </div>
        <h1 class="text-5xl md:text-8xl font-serif font-bold mb-8 tracking-tighter leading-none">
            Team Xiro <span class="italic text-stone-400 dark:text-stone-600">Gravity</span>
        </h1>
        <p class="text-stone-500 dark:text-stone-400 text-lg md:text-2xl max-w-3xl mx-auto leading-relaxed font-light">
            An elite repository of pioneering research and technical breakthroughs, dedicated to pushing the boundaries of human knowledge and technological evolution.
        </p>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        <!-- Search & Filter -->
        <div class="flex flex-col md:flex-row gap-4 mb-12">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" size="20"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search the archives..."
                    class="w-full pl-12 pr-4 py-4 bg-white border border-stone-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-stone-900/5 focus:border-stone-900 transition-all shadow-sm"
                >
            </div>
            <div class="relative">
                <select 
                    id="sortSelect"
                    class="appearance-none pl-6 pr-12 py-4 bg-white border border-stone-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-stone-900/5 focus:border-stone-900 transition-all shadow-sm font-medium cursor-pointer w-full md:w-64"
                >
                    <option value="latest">Latest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="subject-az">Subject (A-Z)</option>
                    <option value="subject-za">Subject (Z-A)</option>
                    <option value="author-az">Author (A-Z)</option>
                    <option value="author-za">Author (Z-A)</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none" size="18"></i>
            </div>
        </div>

        <!-- Submissions Grid -->
        <div id="submissionsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-24 bg-white dark:bg-stone-900/50 rounded-[2rem] border border-dashed border-stone-300 dark:border-stone-800">
            <i data-lucide="file-text" class="mx-auto text-stone-200 dark:text-stone-800 mb-4" size="64"></i>
            <p class="text-stone-500">No records found in the current sector.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-stone-200 py-12 bg-white transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-stone-400 text-sm font-medium tracking-wide uppercase">© 2026 Team Xiro Gravity</p>
        </div>
    </footer>

    <script>
        // EMBEDDED RESEARCH DATA (Directly managed by Gemini)
        const SUBMISSIONS_DATA = [
            {
                "id": "1",
                "name": "Dr. Sarah Chen",
                "email": "sarah.chen@university.edu",
                "subject": "Quantum Computing in Biological Systems",
                "pdfLink": "https://example.com/research/quantum-bio.pdf",
                "date": "2024-02-28",
                "status": "Active"
            },
            {
                "id": "2",
                "name": "Marcus Thorne",
                "email": "m.thorne@lab.org",
                "subject": "Neural Network Optimization for Edge Devices",
                "pdfLink": "https://example.com/research/edge-nn.pdf",
                "date": "2024-02-25",
                "status": "Active"
            }
        ];

        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') html.classList.add('dark');

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const theme = html.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            lucide.createIcons();
        });

        // Initialize Lucide icons
        lucide.createIcons();

        let submissions = SUBMISSIONS_DATA;
        const grid = document.getElementById('submissionsGrid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const emptyState = document.getElementById('emptyState');

        // Initialize Data
        function initSubmissions() {
            try {
                applyFilters();
            } catch (error) {
                console.error('Error initializing submissions:', error);
                grid.innerHTML = `<div class="col-span-full text-center p-12 bg-red-50 dark:bg-red-900/10 rounded-3xl border border-red-100 dark:border-red-900/20">
                    <p class="text-red-600 dark:text-red-400 font-medium mb-2">System Initialization Error</p>
                    <p class="text-red-400 dark:text-red-500 text-sm">${error.message}</p>
                </div>`;
            }
        }

        function applyFilters() {
            const term = searchInput.value.toLowerCase();
            const sortBy = sortSelect.value;

            let filtered = submissions.filter(s => 
                s.name.toLowerCase().includes(term) || 
                s.subject.toLowerCase().includes(term) ||
                s.date.includes(term)
            );

            // Sorting logic
            filtered.sort((a, b) => {
                switch (sortBy) {
                    case 'latest':
                        return new Date(b.date) - new Date(a.date);
                    case 'oldest':
                        return new Date(a.date) - new Date(b.date);
                    case 'subject-az':
                        return a.subject.localeCompare(b.subject);
                    case 'subject-za':
                        return b.subject.localeCompare(a.subject);
                    case 'author-az':
                        return a.name.localeCompare(b.name);
                    case 'author-za':
                        return b.name.localeCompare(a.name);
                    default:
                        return 0;
                }
            });

            renderSubmissions(filtered);
        }

        // Render Cards
        function renderSubmissions(data) {
            grid.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-[2rem] p-8 transition-all duration-300 card-hover hover:shadow-2xl hover:shadow-stone-200/50 dark:hover:shadow-stone-900/50 group flex flex-col h-full';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-400 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">
                            ${item.status || 'Active'}
                        </span>
                        <span class="text-stone-400 dark:text-stone-500 text-xs font-mono">${item.date}</span>
                    </div>
                    
                    <h3 class="text-2xl font-bold mb-4 group-hover:text-stone-700 dark:group-hover:text-stone-300 transition-colors leading-tight flex-grow">
                        ${item.subject}
                    </h3>

                    <div class="space-y-3 mb-8">
                        <div class="flex items-center gap-3 text-stone-500 dark:text-stone-400">
                            <i data-lucide="user" size="16"></i>
                            <span class="font-medium">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-3 text-stone-400 dark:text-stone-500 text-sm">
                            <i data-lucide="mail" size="14"></i>
                            <span>${item.email}</span>
                        </div>
                    </div>

                    <a href="${item.pdfLink}" target="_blank" class="flex items-center justify-center gap-2 w-full py-4 bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 rounded-2xl hover:bg-stone-800 dark:hover:bg-white transition-all font-bold shadow-lg shadow-stone-900/10 dark:shadow-none">
                        <i data-lucide="external-link" size="18"></i>
                        Access Record
                    </a>
                `;
                grid.appendChild(card);
            });
            
            lucide.createIcons();
        }

        // Event Listeners
        searchInput.addEventListener('input', applyFilters);
        sortSelect.addEventListener('change', applyFilters);

        initSubmissions();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchHub | Academic Submissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }
        body { font-family: var(--font-sans); }
        .font-serif { font-family: var(--font-serif); }
        .card-hover:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 group cursor-pointer">
                <div class="w-10 h-10 bg-stone-900 rounded-xl flex items-center justify-center text-white group-hover:bg-stone-800 transition-colors">
                    <i data-lucide="layout" size="20"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">ResearchHub</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="#" class="text-stone-600 hover:text-stone-900 font-medium transition-colors">Submissions</a>
                <a href="https://github.com" target="_blank" class="text-stone-400 hover:text-stone-600 transition-colors">
                    <i data-lucide="github" size="20"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 md:py-24 text-center">
        <h1 class="text-5xl md:text-7xl font-serif font-bold mb-6 tracking-tight leading-tight">
            Research <span class="italic text-stone-400">Submissions</span>
        </h1>
        <p class="text-stone-500 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
            A curated collection of academic research papers and technical contributions from our global community.
        </p>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        <!-- Search & Filter -->
        <div class="flex flex-col md:flex-row gap-4 mb-12">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" size="20"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search by researcher, subject, or date..."
                    class="w-full pl-12 pr-4 py-4 bg-white border border-stone-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-stone-900/5 focus:border-stone-900 transition-all shadow-sm"
                >
            </div>
            <div class="flex gap-2">
                <button class="flex items-center gap-2 px-6 py-4 bg-white border border-stone-200 rounded-2xl hover:bg-stone-50 transition-colors shadow-sm font-medium">
                    <i data-lucide="filter" size="18"></i>
                    <span>Latest First</span>
                </button>
            </div>
        </div>

        <!-- Submissions Grid -->
        <div id="submissionsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-24 bg-white rounded-[2rem] border border-dashed border-stone-300">
            <i data-lucide="file-text" class="mx-auto text-stone-200 mb-4" size="64"></i>
            <p class="text-stone-500 text-lg">No research found matching your search.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-stone-200 py-12 bg-white">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-stone-400 text-sm">© 2024 ResearchHub. Powered by GitOps Architecture.</p>
        </div>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        let submissions = [];
        const grid = document.getElementById('submissionsGrid');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');

        // Fetch Data
        async function loadSubmissions() {
            try {
                const response = await fetch('/data/submissions.json');
                submissions = await response.json();
                renderSubmissions(submissions);
            } catch (error) {
                console.error('Error loading submissions:', error);
                grid.innerHTML = '<p class="text-red-500 col-span-full text-center">Failed to load submissions. Please check data/submissions.json.</p>';
            }
        }

        // Render Cards
        function renderSubmissions(data) {
            grid.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-stone-200 rounded-[2rem] p-8 transition-all duration-300 card-hover hover:shadow-2xl hover:shadow-stone-200/50 group flex flex-col h-full';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-stone-100 text-stone-600 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest">
                            ${item.status}
                        </span>
                        <span class="text-stone-400 text-sm font-mono">${item.date}</span>
                    </div>
                    
                    <h3 class="text-2xl font-bold mb-4 group-hover:text-stone-700 transition-colors leading-tight flex-grow">
                        ${item.subject}
                    </h3>

                    <div class="space-y-3 mb-8">
                        <div class="flex items-center gap-3 text-stone-500">
                            <i data-lucide="user" size="16"></i>
                            <span class="font-medium">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-3 text-stone-400 text-sm">
                            <i data-lucide="mail" size="14"></i>
                            <span>${item.email}</span>
                        </div>
                    </div>

                    <a href="${item.pdfLink}" target="_blank" class="flex items-center justify-center gap-2 w-full py-4 bg-stone-900 text-white rounded-2xl hover:bg-stone-800 transition-all font-bold shadow-lg shadow-stone-900/10">
                        <i data-lucide="download" size="18"></i>
                        Download Paper
                    </a>
                `;
                grid.appendChild(card);
            });
            
            // Re-initialize icons for new elements
            lucide.createIcons();
        }

        // Search Logic
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = submissions.filter(s => 
                s.name.toLowerCase().includes(term) || 
                s.subject.toLowerCase().includes(term) ||
                s.date.includes(term)
            );
            renderSubmissions(filtered);
        });

        // Initial Load
        loadSubmissions();
    </script>
</body>
</html>

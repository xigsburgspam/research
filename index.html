        tailwind.config = {
            darkMode: 'class',

                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],

                }
            }

    <style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        @keyframes rotate-border {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-reveal { opacity: 0; }
        .animate-reveal.visible { animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        
        .card-hover { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .card-hover:hover { 
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 40px 80px -10px rgba(0,0,0,0.25);
        }
        .dark .card-hover:hover {
            box-shadow: 0 40px 80px -10px rgba(0,0,0,0.8);
            border-color: rgba(255,255,255,0.3);
        }

        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(28, 25, 23, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.12);
        }
        .dark .glass-card {
            background: rgba(28, 25, 23, 0.6);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .bg-grid {
            background-size: 50px 50px;
            background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
        }

        /* Custom Cursor */
        #cursor {
            width: 12px;
            height: 12px;
            background: #1c1917;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out, background 0.3s ease, width 0.3s ease, height 0.3s ease;
            mix-blend-mode: difference;
        }
        .dark #cursor { background: #fafaf9; }
        #cursor.hover {
            transform: scale(2.5);
            background: rgba(255,255,255,0.2);
            mix-blend-mode: normal;
            backdrop-filter: blur(4px);
        }

        /* Click Ripple */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }

        /* Scroll Progress */
        #scrollProgress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(to right, #a8a29e, #1c1917, #a8a29e);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            z-index: 100;
            width: 0%;
            transition: width 0.1s ease-out;
        }
        .dark #scrollProgress {
            background: linear-gradient(to right, #44403c, #fafaf9, #44403c);
        }

        /* Magnetic Button */
        .magnetic {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Mouse Reactive Background */
        #bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(28, 25, 23, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        .dark #bg-glow {
            background: radial-gradient(circle, rgba(250, 250, 249, 0.03) 0%, transparent 70%);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: #d6d3d1; 
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb { background: #44403c; }

        .reveal-delay-1 { animation-delay: 0.15s; }
        .reveal-delay-2 { animation-delay: 0.3s; }
        .reveal-delay-3 { animation-delay: 0.45s; }
    </style>
</head>

            <!-- Live Viewers -->

                    </div>
                    <span class="text-[8px] font-black text-stone-400 dark:text-stone-500 uppercase tracking-widest leading-none">Live</span>

            },
            {

                "dept": "AE Aerospace",
                "subject": "RTH Algorithm",
                "pdfLink": "https://drive.google.com/file/d/1rECjq2wPtcR-pWO5asA3hlTP0nIyQXor/view",

            },
            {
                "id": "7",

                "dept": "AME Aerospace",
                "subject": "Aerodynamic Efficiency of Propellers",
                "pdfLink": "https://drive.google.com/file/d/1t9oKj1p1U0odlqigm3brt3LJB3arUmgD/view",
                "date": "03 March 2026",
                "status": "Active"
            },
            {
                "id": "8",
                "name": "Hasan Parvej Aurko",
                "dept": "AE Aerospace",
                "subject": "Servo Motor Analysis",
                "pdfLink": "https://drive.google.com/file/d/1GB011ID-0JgBzWfxIc0aN3BQxFNKv-t0/view",
                "date": "03 March 2026",
                "status": "Active"
            }
        ];

        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'dark') html.classList.add('dark');
        else html.classList.remove('dark');

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const theme = html.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            lucide.createIcons();
        });

        // Custom Cursor & Mouse Reactive Background
        const cursor = document.getElementById('cursor');
        const bgGlow = document.getElementById('bg-glow');
        
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            
            // Cursor movement
            cursor.style.left = clientX + 'px';
            cursor.style.top = clientY + 'px';
            
            // Background glow movement
            bgGlow.style.left = clientX + 'px';
            bgGlow.style.top = clientY + 'px';
            
            // Magnetic effect logic
            const magneticElements = document.querySelectorAll('.magnetic');
            magneticElements.forEach(el => {
                const rect = el.getBoundingClientRect();
                const x = clientX - rect.left - rect.width / 2;
                const y = clientY - rect.top - rect.height / 2;
                const distance = Math.sqrt(x*x + y*y);
                
                if (distance < 100) {
                    el.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
                } else {
                    el.style.transform = `translate(0, 0)`;
                }
            });
        });

        // Hover states for cursor
        document.addEventListener('mouseover', (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.card-hover') || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
                cursor.classList.add('hover');
            }
        });
        
        document.addEventListener('mouseout', (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.card-hover') || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
                cursor.classList.remove('hover');
            }
        });

        // Click Ripple Effect
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            document.body.appendChild(ripple);
            
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            
            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });
            
            // Bounce effect on click for the cursor
            cursor.style.transform = 'scale(0.8)';
            setTimeout(() => {
                cursor.style.transform = cursor.classList.contains('hover') ? 'scale(4)' : 'scale(1)';
            }, 100);
        });

        // Scroll Progress & Back to Top & Reveal on Scroll
        const backToTop = document.getElementById('backToTop');
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scrollProgress").style.width = scrolled + "%";

            if (winScroll > 500) {
                backToTop.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            } else {
                backToTop.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Initialize Lucide icons
        lucide.createIcons();

        // Visitor Counter & Live Viewers Logic
        async function initStats() {
            const statsEl = document.getElementById('statsCounter');
            const visitorCountDisplay = document.getElementById('visitorCount');
            const liveCountDisplay = document.getElementById('liveCount');
            if (!statsEl || !visitorCountDisplay || !liveCountDisplay) return;

            // 1. Initial Fetch
            try {
                const lastVisit = localStorage.getItem('xiro_last_visit');
                const now = Date.now();
                const cooldown = 30 * 60 * 1000; // 30 minutes

                let response;
                if (!lastVisit || (now - parseInt(lastVisit)) > cooldown) {
                    response = await fetch('/api/stats/hit', { method: 'POST' });
                    localStorage.setItem('xiro_last_visit', now.toString());
                } else {
                    response = await fetch('/api/stats');
                }

                if (response.ok) {
                    const data = await response.json();
                    visitorCountDisplay.textContent = data.total.toString().padStart(4, '0');
                    liveCountDisplay.textContent = data.live || 1;
                    statsEl.classList.remove('opacity-0', 'translate-y-4');
                    statsEl.classList.add('translate-y-0');
                }
            } catch (err) {
                console.error('Stats fetch error:', err);
            }

            // 2. WebSocket for Real-time Live Count
            function connectWS() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                const socket = new WebSocket(wsUrl);

                socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'LIVE_COUNT') {
                            liveCountDisplay.textContent = data.count;
                        }
                    } catch (e) {
                        console.error('WS message error:', e);
                    }
                };

                socket.onclose = () => {
                    setTimeout(connectWS, 3000); // Reconnect after 3s
                };

                socket.onerror = (err) => {
                    console.error('WS error:', err);
                    socket.close();
                };
            }

            connectWS();
        }

        initStats();

        let submissions = SUBMISSIONS_DATA;
        const grid = document.getElementById('submissionsGrid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const emptyState = document.getElementById('emptyState');

        // Initialize Data
        function initSubmissions() {
            try {
                // Apply reveal observer to header elements
                document.querySelectorAll('.animate-reveal').forEach(el => revealObserver.observe(el));
                applyFilters();
            } catch (error) {
                console.error('Error initializing submissions:', error);
                grid.innerHTML = `<div class="col-span-full text-center p-12 bg-red-50 dark:bg-red-900/10 rounded-3xl border border-red-100 dark:border-red-900/20">
                    <p class="text-red-600 dark:text-red-400 font-medium mb-2">System Initialization Error</p>
                    <p class="text-red-400 dark:text-red-500 text-sm">${error.message}</p>
                </div>`;
            }
        }

        function applyFilters() {
            const term = searchInput.value.toLowerCase();
            const sortBy = sortSelect.value;

            let filtered = submissions.filter(s => 
                s.name.toLowerCase().includes(term) || 
                s.subject.toLowerCase().includes(term) ||
                s.date.includes(term)
            );

            // Sorting logic
            filtered.sort((a, b) => {
                switch (sortBy) {
                    case 'latest':
                        return new Date(b.date) - new Date(a.date);
                    case 'oldest':
                        return new Date(a.date) - new Date(b.date);
                    case 'subject-az':
                        return a.subject.localeCompare(b.subject);
                    case 'subject-za':
                        return b.subject.localeCompare(a.subject);
                    case 'author-az':
                        return a.name.localeCompare(b.name);
                    case 'author-za':
                        return b.name.localeCompare(a.name);
                    default:
                        return 0;
                }
            });

            renderSubmissions(filtered);
        }

        // Render Cards
        function renderSubmissions(data) {
            grid.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-[2rem] p-8 transition-all duration-300 card-hover hover:shadow-2xl group flex flex-col h-full animate-reveal';
                card.style.transitionDelay = `${(index % 3) * 0.1}s`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="glass text-stone-600 dark:text-stone-300 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">
                            ${item.status || 'Active'}
                        </span>
                        <span class="text-stone-400 dark:text-stone-500 text-xs font-mono">${item.date}</span>
                    </div>
                    
                    <h3 class="text-2xl font-bold mb-4 group-hover:text-stone-700 dark:group-hover:text-stone-300 transition-colors leading-tight flex-grow">
                        ${item.subject}
                    </h3>

                    <div class="space-y-3 mb-8">
                        <div class="flex items-center gap-3 text-stone-500 dark:text-stone-400">
                            <i data-lucide="user" size="16"></i>
                            <span class="font-medium">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-3 text-stone-400 dark:text-stone-500 text-sm">
                            <i data-lucide="briefcase" size="14"></i>
                            <span>${item.dept}</span>
                        </div>
                    </div>

                    <a href="${item.pdfLink}" target="_blank" class="magnetic glass flex items-center justify-center gap-2 w-full py-4 text-stone-900 dark:text-white rounded-2xl hover:bg-white/20 dark:hover:bg-white/10 transition-all font-bold shadow-xl shadow-stone-900/10 dark:shadow-black/20">
                        <i data-lucide="external-link" size="18"></i>
                        Access Record
                    </a>
                `;
                grid.appendChild(card);
                revealObserver.observe(card);
            });
            
            lucide.createIcons();
        }

        // Event Listeners
        searchInput.addEventListener('input', applyFilters);
        sortSelect.addEventListener('change', applyFilters);

        initSubmissions();
    </script>
</body>
</html>
